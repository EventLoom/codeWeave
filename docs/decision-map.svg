<text x="60" y="360" class="layer">Layer 3</text>
<text x="60" y="440" class="layer">Layer 4</text>

<!-- Layer 0 -->
<rect x="150" y="90" width="220" height="40" class="box"></rect>
<text x="260" y="115" text-anchor="middle" class="node">ADR-0-001 Execution Model</text>

<rect x="400" y="90" width="220" height="40" class="box"></rect>
