<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">

<style>
.layer { font: bold 16px sans-serif; fill: #111; }
.node { font: 13px sans-serif; fill: #333; }
.box { fill: #f5f7fa; stroke: #444; stroke-width: 1.5; rx: 6; }
.title { font: bold 22px sans-serif; fill: #111; }
</style>

<text x="450" y="40" text-anchor="middle" class="title">CodeWeave ADR Decision Map</text>

<!-- Layer Labels -->
